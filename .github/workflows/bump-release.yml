name: Bump & Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (leave 'auto' to detect from commit messages)"
        required: true
        type: choice
        default: auto
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-and-tag:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine branch and tag suffix
        id: branch
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

          if [ "$BRANCH" = "main" ]; then
            echo "suffix=" >> "$GITHUB_OUTPUT"
            echo "kind=release" >> "$GITHUB_OUTPUT"
          elif [ "$BRANCH" = "validation" ]; then
            echo "suffix=rc" >> "$GITHUB_OUTPUT"
            echo "kind=rc" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=beta" >> "$GITHUB_OUTPUT"
            echo "kind=beta" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect bump type from commits
        id: detect
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          COMMITS=$(git log --pretty=format:"%s" "$RANGE")
          echo "## Commits since $LAST_TAG:"
          echo "$COMMITS"
          echo ""

          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^feat(\(.*\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^feat(\(.*\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qiE "^(fix|perf)(\(.*\))?:"; then
            BUMP="patch"
          fi

          echo "detected=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Detected bump: $BUMP"

      - name: Resolve bump type
        id: bump
        run: |
          if [ "${{ inputs.bump }}" = "auto" ]; then
            BUMP="${{ steps.detect.outputs.detected }}"
          else
            BUMP="${{ inputs.bump }}"
          fi
          echo "type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Using bump type: $BUMP"

      - name: Compute new version
        id: version
        run: |
          CURRENT=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Compute prerelease number
        id: prerelease
        if: steps.branch.outputs.suffix != ''
        run: |
          SUFFIX="${{ steps.branch.outputs.suffix }}"
          VERSION="${{ steps.version.outputs.new }}"
          # Count existing tags matching vA.B.C{suffix}* to determine the next number
          COUNT=$(git tag -l "v${VERSION}${SUFFIX}*" | wc -l)
          NUM=$((COUNT + 1))
          echo "num=$NUM" >> "$GITHUB_OUTPUT"

      - name: Compute full tag
        id: tag
        run: |
          VERSION="${{ steps.version.outputs.new }}"
          SUFFIX="${{ steps.branch.outputs.suffix }}"
          if [ -n "$SUFFIX" ]; then
            TAG="v${VERSION}${SUFFIX}${{ steps.prerelease.outputs.num }}"
          else
            TAG="v${VERSION}"
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      - name: Summary
        run: |
          echo "### Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | ${{ steps.branch.outputs.name }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Kind** | ${{ steps.branch.outputs.kind }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Current** | v${{ steps.version.outputs.current }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **New Tag** | ${{ steps.tag.outputs.value }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Bump** | ${{ steps.bump.outputs.type }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Auto-detected** | ${{ steps.detect.outputs.detected }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Bump Cargo.toml
        if: steps.branch.outputs.suffix == ''
        run: sed -i "0,/^version = \".*\"/s//version = \"${{ steps.version.outputs.new }}\"/" Cargo.toml

      - name: Update Cargo.lock
        if: steps.branch.outputs.suffix == ''
        run: cargo generate-lockfile

      - name: Commit, tag, and push
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          TAG="${{ steps.tag.outputs.value }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only commit version bump on main (final releases)
          if [ "$BRANCH" = "main" ]; then
            git add Cargo.toml Cargo.lock
            git commit -m "chore: release ${TAG}"
          fi

          git tag "$TAG"
          git push origin "$BRANCH" --tags
