name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-dev

      - name: Format check
        run: cargo +nightly fmt --check

      - name: Clippy (no features)
        run: cargo clippy -- -D warnings

      - name: Clippy (NFS)
        run: cargo clippy --features nfs -- -D warnings

      - name: Clippy (FUSE)
        run: cargo clippy --features fuse -- -D warnings

      - name: Clippy (all)
        run: cargo clippy --features fuse,nfs -- -D warnings

      - name: Unit tests
        run: cargo test --lib --features fuse,nfs

  repo-test:
    name: Repo Mount Tests
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-dev
          echo 'user_allow_other' | sudo tee -a /etc/fuse.conf

      - name: Build release binaries
        run: cargo build --release --features fuse

      - name: Integration tests (repo mount)
        run: cargo test --release --test repo_ops -- --test-threads=1 --nocapture
