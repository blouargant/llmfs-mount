name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/blouargant/llmfs-mount-fuse

jobs:
  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Build
        run: |
          T="${{ matrix.target }}"
          cargo build --release --target $T --no-default-features --features fuse,vendored-openssl --bin llmfs-mount-fuse
          cargo build --release --target $T --no-default-features --features fuse,vendored-openssl --bin llmfs-mount-fuse-sidecar
          cargo build --release --target $T --no-default-features --features nfs,vendored-openssl --bin llmfs-mount-nfs
          cargo build --release --target $T --no-default-features --features vendored-openssl --bin llmfs-mount

      - name: Build .deb package
        run: cargo deb --no-build --no-strip --target ${{ matrix.target }}

      - name: Build .rpm package
        run: cargo generate-rpm --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          for bin in llmfs-mount-fuse llmfs-mount-fuse-sidecar llmfs-mount-nfs llmfs-mount; do
            cp target/${{ matrix.target }}/release/$bin dist/${bin}-${{ matrix.arch }}-linux
          done
          chmod +x dist/*
          cp target/${{ matrix.target }}/debian/*.deb dist/
          cp target/${{ matrix.target }}/generate-rpm/*.rpm dist/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install macFUSE
        run: brew install macfuse

      - name: Build
        run: |
          T="${{ matrix.target }}"
          cargo build --release --target $T --no-default-features --features fuse,vendored-openssl --bin llmfs-mount-fuse
          cargo build --release --target $T --no-default-features --features fuse,vendored-openssl --bin llmfs-mount-fuse-sidecar
          cargo build --release --target $T --no-default-features --features nfs,vendored-openssl --bin llmfs-mount-nfs
          cargo build --release --target $T --no-default-features --features vendored-openssl --bin llmfs-mount

      - name: Package
        run: |
          mkdir -p dist
          for bin in llmfs-mount-fuse llmfs-mount-fuse-sidecar llmfs-mount-nfs llmfs-mount; do
            cp target/${{ matrix.target }}/release/$bin dist/${bin}-${{ matrix.arch }}-apple-darwin
          done
          chmod +x dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/

  docker:
    name: Build & Push Docker
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Determine tags
        id: tags
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          TAGS="${{ env.IMAGE }}:${TAG}"
          if [[ "$TAG" != *"-"* ]]; then
            TAGS="${TAGS},${{ env.IMAGE }}:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  release:
    name: Create Release
    needs: [build-linux, build-macos]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '{linux-*,macos-*}'
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" artifacts/* \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
